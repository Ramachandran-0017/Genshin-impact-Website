<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/c54f248231.js"
      crossorigin="anonymous"
    ></script>
    <title>Genshin Login</title>
    <link rel="stylesheet" href="./login-page.css" />
  </head>
  <body class="login-page">
    <video autoplay muted loop id="bg-video">
      <source
        src="./columbina-hyposelenia-memories-of-the-moon.3840x2160.mp4"
        type="video/mp4"
      />
    </video>

    <div class="login-box">
      <div>
        <i class="fa-solid fa-angle-left"></i> <i class="fa-solid fa-xmark"></i>
      </div>

      <div>
        <img src="./HoYoverse-Logo.png" />
      </div>

      <div>
        <input type="text" placeholder="Enter Email/Username" />
        <input type="password" placeholder="Enter Password" />
      </div>

      <div>
        <a href="#">Register Now</a>
        <a href="#">Forgot Password?</a>
      </div>
      <button onclick="window.location.href = '../index.html'">Log in</button>

      <div class="borders">
        <div class="lb"></div>
        <p>Log in with</p>
        <div class="rb"></div>
      </div>

      <div class="socials">
        <div class="g-logins logins">
          <img src="./google_PNG19630-1552234456.png" />
          <p>Google</p>
        </div>

        <div class="f-logins logins">
          <img src="./facebook.png" />
          <p>Facebook</p>
        </div>

        <div class="x-logins logins">
          <img src="./twitter.png" />
          <p>Twitter</p>
        </div>
      </div>
    </div>
  </body>
</html>
